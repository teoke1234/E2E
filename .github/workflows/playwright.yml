name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allows manual triggering of the workflow with a specified environment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - stg

jobs:
  test:
    name: Run Playwright Tests on ${{ github.event.inputs.environment || 'prod' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Playwright tests
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'prod' }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          BASE_URL: ${{ github.event.inputs.environment == 'stg' && 'https://stg-checklyhq.com' || 'https://checklyhq.com' }}
          APP_URL: ${{ github.event.inputs.environment == 'stg' && 'https://checklyhq.com' || 'https://checklyhq.com' }}
          API_URL: "https://marketstack.com/v2/"
          TIMEOUT: 30000
          RETRY_COUNT: 1
        run: npx playwright test

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.event.inputs.environment || 'prod' }}
          path: playwright-report/
          retention-days: 30
