name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - stg

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # ✅ Correct environment selection (NOT boolean)
    environment: ${{ github.event.inputs.environment || 'prod' }}

    # ✅ Make env available to ALL steps
    env:
      ENV_NAME: ${{ github.event.inputs.environment || 'prod' }}
      BASE_URL: ${{ vars.BASE_URL }}
      APP_URL: ${{ vars.APP_URL }}
      API_URL: ${{ vars.API_URL }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # 💾 Playwright cache (FIXED ubuntu key naming)
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ubuntu-latest-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ubuntu-latest-playwright-

      # 🎭 Install browsers only if cache miss
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # ⚙️ If cache hit, only install system deps
      - name: Install Playwright system dependencies (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # 🔍 DEBUG ENV
      - name: Debug ENV
        run: |
          echo "ENV_NAME=$ENV_NAME"
          echo "BASE_URL=$BASE_URL"
          echo "APP_URL=$APP_URL"
          echo "API_URL=$API_URL"

      # ❗ Validate ENV before tests
      - name: Validate ENV
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "❌ BASE_URL is empty → check GitHub Environment variables"
            exit 1
          fi
          echo "✅ ENV loaded"

      # 🧪 Run tests
      - name: Run Playwright tests
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          TIMEOUT: 30000
          RETRY_COUNT: 1
        run: npx playwright test

      # 📊 Upload report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ env.ENV_NAME }}
          path: playwright-report/
          retention-days: 30
